# ------------------------------------------------------------------
#  Hlídač nájemních bytů — nastavení hledání
#  Zkopíruj tento soubor na  config.yaml  a uprav podle sebe:
#     cp config.example.yaml config.yaml     (Mac/Linux)
#     copy config.example.yaml config.yaml   (Windows)
# ------------------------------------------------------------------

hledani:
  mesto: "Hradec Králové"      # hledá se POUZE v tomto městě (vč. jeho čtvrtí), okolní obce se vyřadí
  max_cena: 20000              # max. CELKOVÁ měsíční cena v Kč = nájem + poplatky/energie (i odhadnuté)
  min_plocha: 30               # minimální plocha v m² (menší se nevyřadí, jen dostanou nižší skóre)
  min_dispozice: "1+kk"        # nejmenší akceptovaná dispozice (1+kk, 1+1, 2+kk, …)

  # Venkovní prostor (balkon/terasa/lodžie/zahrada) je HLAVNÍ priorita při řazení.
  # false = byty bez něj se NEvyřazují — v přehledu je na ně přepínač "jen s venkovním".
  # true  = byty bez venkovního prostoru se do přehledu vůbec nedostanou.
  vyzaduj_venkovni_prostor: false
  # Které typy se počítají jako venkovní prostor (lodžie = zapuštěný balkon, bere se taky).
  venkovni_typy: ["balkon", "terasa", "lodzie", "zahrada"]

  # Mazlíčci: "vypnuto" = nevyřazovat, jen označit v přehledu (filtruje se tam přepínačem),
  #           "jen_zakaz" = vyřadí inzeráty s jasným zákazem zvířat už při zpracování,
  #           "vse" = vyřadí i nejednoznačné ("po dohodě").
  mazlicci_filtr: "vypnuto"

  # Skrýt inzeráty označené jako rezervované / obsazené / již pronajaté.
  vyloucit_rezervovane: true

  # Volitelně povol i okolní obce (default prázdné = opravdu jen město výše).
  # Např.:  okoli: ["Třebechovice pod Orebem", "Předměřice nad Labem"]
  okoli: []

# Které portály prohledávat (můžeš kterýkoli vypnout na false)
zdroje:
  sreality: true
  bezrealitky: true
  ulovdomov: true
  idnes: true

# Chování
provoz:
  max_stran_na_zdroj: 10       # kolik stránek výsledků max projít u každého portálu
  detail_cache_dny: 14         # jak dlouho držet stažený detail bytu v cache (šetří požadavky)
  posilat_telegram: true       # posílat notifikace na Telegram (jinak jen dashboard)

  # Zpracování inzerátů přes Gemini/LLM (spolehlivé poplatky, kauce, venkovní prostor…).
  # Vyžaduje API klíč v .env (GEMINI_API_KEY). Bez klíče se použije jen textový fallback.
  odhad_poplatku: true         # když poplatky nikde nejsou, nech je odhadnout (jasně se označí)
  llm_workers: 10              # kolik inzerátů zpracovat paralelně (Tier 1 zvládne víc = rychlejší)
